# Comprehensive CI/CD workflow for all components
name: CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies and run tests
        env:
          OPENCAGEDATA_API_KEY: ${{ secrets.OPENCAGEDATA_API_KEY }}
        run: make test-backend
        
      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            utils/htmlcov/
            collection/htmlcov/
            server-side/htmlcov/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client-side/package-lock.json
          
      - name: Install dependencies
        working-directory: client-side
        run: npm ci
        
      - name: Run linting
        working-directory: client-side
        run: npm run lint
        
      - name: Run type checking
        working-directory: client-side
        run: npm run typecheck
        
      - name: Run tests
        working-directory: client-side
        run: npm run test:coverage
        
      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client-side/coverage/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client-side/package-lock.json
          
      - name: Install dependencies
        working-directory: client-side
        run: npm ci
        
      - name: Build application
        working-directory: client-side
        run: npm run build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client-side/dist/

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        working-directory: server-side
        run: docker build -t city-data-backend:latest .
